name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop tests, types, and renderer build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ReverieCli-ui
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ReverieCli-ui/package-lock.json
      - name: Install desktop dependencies
        run: npm ci
      - name: Run desktop test suite
        run: npm test
      - name: Check desktop types
        run: npm run typecheck
      - name: Build desktop renderer
        run: npm run build

  python:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"

    defaults:
      run:
        working-directory: ReverieCli-py

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            ReverieCli-py/setup.py
            ReverieCli-py/requirements.txt

      - name: Install Linux graphics test dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgl1-mesa-dev libx11-dev xauth xvfb

      - name: Install test dependencies
        run: |
          python -m pip install "pip==26.1.2" "setuptools==81.0.0" "wheel==0.46.3"
          python -m pip install -e ".[dev,treesitter]"

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Compile package
        run: python -m compileall -q reverie

      - name: Check package metadata
        run: python setup.py check

      - name: Run test suite on Linux
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum python -m pytest -q

      - name: Run test suite
        if: runner.os != 'Linux'
        run: python -m pytest -q

      - name: Verify source SDK bridge
        run: python scripts/smoke_sdk_bridge.py

  quality:
    name: Coverage and security policy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ReverieCli-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ReverieCli-py/setup.py
      - name: Install Linux graphics test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgl1-mesa-dev libx11-dev xauth xvfb
      - name: Install test dependencies
        run: |
          python -m pip install "pip==26.1.2" "setuptools==81.0.0" "wheel==0.46.3"
          python -m pip install -e ".[dev]"
      - name: Enforce exact direct dependency pins
        run: python scripts/check_dependency_pins.py
      - name: Run coverage gate
        run: xvfb-run --auto-servernum python -m pytest -q --cov=reverie --cov-report=term-missing --cov-fail-under=20
      - name: Run workspace security regression suite
        run: xvfb-run --auto-servernum python -m pytest -q tests/test_security_permissions.py tests/test_workspace_guard.py
