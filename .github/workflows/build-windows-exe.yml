name: Build Windows exe

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  schedule:
    # Daily at 02:17 Asia/Shanghai. Scheduled workflows run on the default branch.
    - cron: "17 18 * * *"
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish the verified artifacts to the rolling latest release
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: build-windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-exe:
    name: Build CLI, desktop, and plugins
    runs-on: windows-latest
    timeout-minutes: 150

    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYINSTALLER_CONFIG_DIR: ${{ github.workspace }}\build\pyinstaller-config
      REVERIE_PY_ROOT: ${{ github.workspace }}\ReverieCli-py
      BLENDER_ARCHIVE_NAME: blender-5.1.1-windows-x64.zip
      BLENDER_ARCHIVE_URL: https://download.blender.org/release/Blender5.1/blender-5.1.1-windows-x64.zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            ReverieCli-py/requirements.txt
            ReverieCli-py/setup.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ReverieCli-ui/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install "pip==26.1.2" "setuptools==81.0.0" "wheel==0.46.3"
          python -m pip install -e "$env:REVERIE_PY_ROOT[build]"
          python -m pip check

      - name: Generate application icons
        shell: pwsh
        run: |
          $source = Join-Path $env:REVERIE_PY_ROOT "reverie.png"
          $rootIcon = Join-Path $env:REVERIE_PY_ROOT "reverie.ico"
          if (-not (Test-Path $source)) {
            throw "Missing required icon source: $source"
          }
          $iconScript = Join-Path $env:REVERIE_PY_ROOT "scripts\generate_reverie_icons.py"
          python $iconScript --source $source $rootIcon
          "REVERIE_ICON_PATH=$rootIcon" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Prepare bundled resources
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE "build\bundle_resources"
          $comfyRoot = Join-Path $bundleRoot "comfy"
          $browserRoot = Join-Path $bundleRoot "browser"
          $playwrightBrowsers = Join-Path $browserRoot "ms-playwright"
          New-Item -ItemType Directory -Force -Path $comfyRoot | Out-Null
          New-Item -ItemType Directory -Force -Path $playwrightBrowsers | Out-Null

          $sourceComfy = Join-Path $env:GITHUB_WORKSPACE "comfy"
          foreach ($name in @("generate_image.py", "embedded_comfy.b64")) {
            $source = Join-Path $sourceComfy $name
            if (-not (Test-Path $source)) {
              throw "Missing required bundled resource: $source"
            }
            Copy-Item -LiteralPath $source -Destination (Join-Path $comfyRoot $name) -Force
          }

          $env:PLAYWRIGHT_BROWSERS_PATH = $playwrightBrowsers
          python -m playwright install chromium --no-shell
          $chromiumExe = Get-ChildItem -LiteralPath $playwrightBrowsers -Recurse -Filter chrome.exe | Select-Object -First 1
          if (-not $chromiumExe) {
            throw "Playwright Chromium install did not produce chrome.exe under $playwrightBrowsers"
          }
          Write-Host "Bundled embedded Chromium: $($chromiumExe.FullName)"

          "REVERIE_BUNDLE_RES_DIR=$bundleRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Python exe
        shell: pwsh
        run: |
          $pythonDist = Join-Path $env:GITHUB_WORKSPACE "dist-python"
          $pythonWork = Join-Path $env:GITHUB_WORKSPACE "build\pyinstaller-python"
          if (Test-Path $pythonDist) {
            Remove-Item -LiteralPath $pythonDist -Recurse -Force
          }
          if (Test-Path $pythonWork) {
            Remove-Item -LiteralPath $pythonWork -Recurse -Force
          }

          Push-Location $env:REVERIE_PY_ROOT
          try {
            $env:PYI_PYTHONWARNINGS = "ignore:Core Pydantic V1 functionality isn't compatible with Python 3.14 or greater.:UserWarning"
            $env:PYTHONWARNINGS = $env:PYI_PYTHONWARNINGS
            PyInstaller --noconfirm --clean --distpath $pythonDist --workpath $pythonWork reverie.spec
          }
          finally {
            $env:PYTHONWARNINGS = ""
            Pop-Location
          }

          $pythonExe = Join-Path $pythonDist "reverie.exe"
          if (-not (Test-Path $pythonExe)) {
            throw "Python build completed without producing dist-python\reverie.exe"
          }
          & $pythonExe --version

      - name: Install desktop dependencies
        working-directory: ReverieCli-ui
        run: npm ci

      - name: Install FFmpeg
        shell: pwsh
        run: |
          choco install ffmpeg --version=8.1.2 --yes --no-progress
          ffmpeg -version | Select-Object -First 1

      - name: Build Electron installer and portable desktop
        shell: pwsh
        run: |
          $env:REVERIE_PYINSTALLER_PATH = (Get-Command pyinstaller).Source
          $env:REVERIE_PYTHON_PATH = (Get-Command python).Source
          Push-Location (Join-Path $env:GITHUB_WORKSPACE "ReverieCli-ui")
          try {
            npm run dist:win
          }
          finally {
            Pop-Location
          }

          $version = node -p "require('./ReverieCli-ui/package.json').version"
          $setup = Join-Path $env:GITHUB_WORKSPACE "ReverieCli-ui\release\Reverie-Setup-$version-x64.exe"
          $portable = Join-Path $env:GITHUB_WORKSPACE "dist\Reverie-Portable-$version-x64.exe"
          foreach ($artifact in @($setup, $portable)) {
            if (-not (Test-Path $artifact)) {
              throw "Desktop build completed without producing $artifact"
            }
          }

      - name: Prepare Blender plugin archive
        shell: pwsh
        run: |
          $target = Join-Path $env:GITHUB_WORKSPACE "plugins\blender\$env:BLENDER_ARCHIVE_NAME"
          if (Test-Path $target) {
            Write-Host "Blender archive already present: $target"
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:BLENDER_ARCHIVE_URL)) {
            throw "BLENDER_ARCHIVE_URL is required to build the Blender plugin."
          }
          New-Item -ItemType Directory -Force -Path (Split-Path -Parent $target) | Out-Null
          Write-Host "Downloading Blender archive from $env:BLENDER_ARCHIVE_URL"
          Invoke-WebRequest -Uri $env:BLENDER_ARCHIVE_URL -OutFile $target
          if (-not (Test-Path $target)) {
            throw "Failed to download Blender archive to $target"
          }

      - name: Build plugin executables
        shell: pwsh
        run: |
          $plugins = @(
            @{ Id = "blender"; Path = "plugins\blender"; Exe = "reverie-blender.exe" },
            @{ Id = "game_models"; Path = "plugins\game_models"; Exe = "reverie-game-models.exe" }
          )
          foreach ($plugin in $plugins) {
            $pluginDir = Join-Path $env:GITHUB_WORKSPACE $plugin.Path
            $buildScript = Join-Path $pluginDir "build.bat"
            if (-not (Test-Path $buildScript)) {
              throw "Missing plugin build script: $buildScript"
            }
            Write-Host "Building plugin $($plugin.Id)"
            & $buildScript
            if ($LASTEXITCODE -ne 0) {
              throw "Plugin build failed for $($plugin.Id) with exit code $LASTEXITCODE"
            }
            $exePath = Join-Path $pluginDir "dist\$($plugin.Exe)"
            if (-not (Test-Path $exePath)) {
              throw "Plugin build completed without producing $exePath"
            }
            $handshake = & $exePath -RC | ConvertFrom-Json
            if ($handshake.plugin_id -ne $plugin.Id) {
              throw "Plugin $($plugin.Id) returned unexpected handshake id: $($handshake.plugin_id)"
            }
          }

      - name: Generate plugin release manifest
        shell: pwsh
        run: |
          function Get-Sha256($Path) {
            return (Get-FileHash -Algorithm SHA256 -LiteralPath $Path).Hash.ToLowerInvariant()
          }

          $releaseTag = if ($env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -like "v*") {
            $env:GITHUB_REF_NAME
          }
          else {
            "latest"
          }
          $releaseBase = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$releaseTag"
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $cliPath = Join-Path $env:GITHUB_WORKSPACE "dist\reverie.exe"
          $pythonCliSource = Join-Path $env:GITHUB_WORKSPACE "dist-python\reverie.exe"
          if (-not (Test-Path $pythonCliSource)) {
            throw "Missing Python CLI asset: $pythonCliSource"
          }
          Copy-Item -LiteralPath $pythonCliSource -Destination $cliPath -Force
          $plugins = @(
            @{ Id = "blender"; Manifest = "plugins\blender\plugin.json"; Asset = "reverie-blender.exe"; Path = "plugins\blender\dist\reverie-blender.exe" },
            @{ Id = "game_models"; Manifest = "plugins\game_models\plugin.json"; Asset = "reverie-game-models.exe"; Path = "plugins\game_models\dist\reverie-game-models.exe" }
          )

          $manifest = [ordered]@{
            schema = "reverie.plugins.release.v1"
            generated_at = (Get-Date).ToUniversalTime().ToString("o")
            commit = $env:GITHUB_SHA
            event_name = $env:GITHUB_EVENT_NAME
            run_id = $env:GITHUB_RUN_ID
            run_url = "https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID"
            cli_asset = [ordered]@{
              name = "reverie.exe"
              download_url = "$releaseBase/reverie.exe"
              sha256 = Get-Sha256 $cliPath
              size = (Get-Item -LiteralPath $cliPath).Length
              includes_builtin_skills = $true
              runtime = "python"
            }
            plugins = @()
          }

          foreach ($plugin in $plugins) {
            $assetPath = Join-Path $env:GITHUB_WORKSPACE $plugin.Path
            $manifestPath = Join-Path $env:GITHUB_WORKSPACE $plugin.Manifest
            if (-not (Test-Path $assetPath)) {
              throw "Missing plugin asset: $assetPath"
            }
            $pluginJson = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
            $manifest.plugins += [ordered]@{
              id = $plugin.Id
              name = $pluginJson.display_name
              version = $pluginJson.version
              asset_name = $plugin.Asset
              download_url = "$releaseBase/$($plugin.Asset)"
              sha256 = Get-Sha256 $assetPath
              size = (Get-Item -LiteralPath $assetPath).Length
              capabilities = @($pluginJson.capabilities)
              manifest = $pluginJson
            }
          }

          $manifestPath = Join-Path $env:GITHUB_WORKSPACE "dist\plugins-manifest.json"
          $manifest | ConvertTo-Json -Depth 40 | Set-Content -LiteralPath $manifestPath -Encoding utf8
          Get-Content -LiteralPath $manifestPath

      - name: Verify executable
        shell: pwsh
        run: |
          .\dist\reverie.exe --version
          python .\ReverieCli-py\scripts\smoke_sdk_bridge.py --executable .\dist\reverie.exe

          $manifest = Get-Content .\dist\plugins-manifest.json -Raw | ConvertFrom-Json
          if ($manifest.plugins.Count -ne 2) {
            throw "Expected 2 compiled plugin entries in plugins-manifest.json."
          }
          foreach ($plugin in $manifest.plugins) {
            $assetPath = Join-Path $env:GITHUB_WORKSPACE "plugins\$($plugin.id)\dist\$($plugin.asset_name)"
            if ($plugin.id -eq "game_models") {
              $assetPath = Join-Path $env:GITHUB_WORKSPACE "plugins\game_models\dist\$($plugin.asset_name)"
            }
            if (-not (Test-Path $assetPath)) {
              throw "Manifest references missing plugin asset: $assetPath"
            }
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reverie-windows-${{ github.sha }}
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/reverie.exe
            dist/Reverie-Portable-*.exe
            dist/plugins-manifest.json
            ReverieCli-ui/release/Reverie-Setup-*.exe
            plugins/blender/dist/reverie-blender.exe
            plugins/game_models/dist/reverie-game-models.exe

      - name: Publish verified release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./ReverieCli-ui/package.json').version"
          $isVersionTag = $env:GITHUB_REF_TYPE -eq "tag" -and $env:GITHUB_REF_NAME -like "v*"
          if ($isVersionTag) {
            $releaseTag = $env:GITHUB_REF_NAME
            $releaseTitle = "Reverie $releaseTag"
            if ($releaseTag -ne "v$version") {
              throw "Release tag $releaseTag does not match package version v$version"
            }
          }
          else {
            $releaseTag = "latest"
            $releaseTitle = "Reverie CLI Latest"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -f latest $env:GITHUB_SHA
            git push origin refs/tags/latest --force
          }

          $notes = @"
          Automated verified Windows release build for $releaseTitle.

          Files:
          - reverie.exe: primary Windows CLI executable. This is the full Python PyInstaller build with bundled Python runtime, built-in skills, tool manifests, the embedded Chromium browser-control runtime, and the built-in Open Computer Use desktop controller/SubAgent orchestration stack.
          - Reverie-Setup-$version-x64.exe: native Electron desktop installer with the embedded Reverie CLI kernel.
          - Reverie-Portable-$version-x64.exe: portable desktop executable with a reusable side-by-side runtime cache.
          - plugins-manifest.json: release metadata consumed by Reverie UI/plugin download surfaces, including SHA-256 and file sizes.
          - reverie-blender.exe: Blender runtime plugin executable.
          - reverie-game-models.exe: Game Models runtime plugin executable.
          - Godot and O3DE runtime patterns are built into Reverie Engine and no longer ship as plugins.
          - Ren'Py and Live2D remain optional source plugins and are not uploaded as rolling Release assets.

          Commit: $env:GITHUB_SHA
          Event: $env:GITHUB_EVENT_NAME
          Run: https://github.com/$env:GITHUB_REPOSITORY/actions/runs/$env:GITHUB_RUN_ID
          "@
          gh release view $releaseTag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $releaseTag --repo $env:GITHUB_REPOSITORY --title $releaseTitle --notes $notes --latest
          }
          else {
            gh release create $releaseTag --repo $env:GITHUB_REPOSITORY --title $releaseTitle --notes $notes --latest
          }

          # Uploading with --clobber does not remove differently named assets from
          # earlier releases. Delete retired runtime plugins explicitly.
          foreach ($retiredAsset in @("reverie-godot.exe", "reverie-o3de.exe")) {
            gh release delete-asset $releaseTag $retiredAsset --repo $env:GITHUB_REPOSITORY --yes 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Retired asset already absent: $retiredAsset"
            }
          }

          $setupPath = "ReverieCli-ui\release\Reverie-Setup-$version-x64.exe"
          $portablePath = "dist\Reverie-Portable-$version-x64.exe"
          $assets = @(
            @{ Path = "dist\reverie.exe"; Label = "Reverie CLI for Windows (Python full build)" },
            @{ Path = $setupPath; Label = "Reverie Desktop installer for Windows" },
            @{ Path = $portablePath; Label = "Reverie Desktop portable for Windows" },
            @{ Path = "dist\plugins-manifest.json"; Label = "Release manifest with hashes and plugin metadata" },
            @{ Path = "plugins\blender\dist\reverie-blender.exe"; Label = "Blender runtime plugin" },
            @{ Path = "plugins\game_models\dist\reverie-game-models.exe"; Label = "Game Models runtime plugin" }
          )
          foreach ($asset in $assets) {
            $uploadSpec = "$($asset.Path)#$($asset.Label)"
            gh release upload $releaseTag $uploadSpec --repo $env:GITHUB_REPOSITORY --clobber
          }
